<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INFINITY STORE</title>
    <style>
        :root {
            --primary: #0f172a;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-dark: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg); color: var(--text-dark); }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.2rem 2.5rem;
            background: var(--primary);
            color: #fff;
        }
        .logo { font-size: 1.25rem; font-weight: 800; letter-spacing: 0.5px; color: #fff; text-decoration: none; }
        .nav-actions { display: flex; gap: 1rem; align-items: center; }
        .nav-btn {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.2s;
        }
        .nav-btn:hover { background: rgba(255,255,255,0.2); }
        .primary-btn { background: var(--accent); border: none; }
        .primary-btn:hover { background: var(--accent-hover); }

        .container { max-width: 1200px; margin: 2.5rem auto; padding: 0 1.5rem; }
        .section-title { font-size: 1.5rem; font-weight: 700; color: var(--primary); margin-bottom: 1.5rem; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; transition: transform 0.2s, box-shadow 0.2s; }
        .card:hover { transform: translateY(-2px); box-shadow: 0 8px 16px rgba(0,0,0,0.04); }
        .card-img { width: 100%; height: 200px; object-fit: cover; background: #f1f5f9; }
        .card-body { padding: 1.25rem; display: flex; flex-direction: column; flex-grow: 1; }
        .card-title { font-size: 1.1rem; font-weight: 600; color: var(--primary); margin-bottom: 0.4rem; }
        .card-desc { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1rem; line-height: 1.4; flex-grow: 1; }
        .card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: auto; padding-top: 0.5rem; }
        .price { font-size: 1.15rem; font-weight: 700; color: var(--primary); }
        .stock-badge { font-size: 0.75rem; background: #f1f5f9; color: var(--text-muted); padding: 0.25rem 0.5rem; border-radius: 4px; font-weight: 500; }

        .btn-cart { width: 100%; margin-top: 1rem; padding: 0.65rem; background: var(--primary); color: #fff; border: none; border-radius: 6px; font-weight: 600; font-size: 0.875rem; cursor: pointer; transition: background 0.2s; }
        .btn-cart:hover { background: var(--accent); }

        /* Modal Styles */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(15,23,42,0.6); backdrop-filter: blur(4px); justify-content: center; align-items: center; z-index: 1000; }
        .modal { background: #fff; padding: 2rem; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        .modal h2 { margin-bottom: 1rem; color: var(--primary); }
        .modal-form { display: flex; flex-direction: column; gap: 1rem; }
        .modal-form input { padding: 0.65rem; border: 1px solid var(--border); border-radius: 6px; outline: none; }
        .modal-form button { padding: 0.75rem; background: var(--accent); color: white; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; }
        .modal-toggle { font-size: 0.85rem; color: var(--text-muted); margin-top: 1rem; text-align: center; cursor: pointer; }
        .modal-toggle span { color: var(--accent); font-weight: 600; }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="/" class="logo">INFINITY STORE</a>
        <div class="nav-actions">
            <a href="/admin.html" class="nav-btn">Admin Portal</a>
            <button class="nav-btn primary-btn" onclick="openLoginModal()">Sign In</button>
        </div>
    </nav>

    <main class="container">
        <h2 class="section-title">Explore Products</h2>
        <div id="productGrid" class="grid">
            <p style="color: var(--text-muted);">Loading products...</p>
        </div>
    </main>

    <!-- Login/Register Modal -->
    <div id="loginModal" class="modal-overlay">
        <div class="modal">
            <h2 id="modalTitle">Sign In</h2>
            <form class="modal-form" onsubmit="handleAuth(event)">
                <input type="email" id="authEmail" placeholder="Email Address" required>
                <input type="password" id="authPassword" placeholder="Password" required>
                <button type="submit" id="authSubmitBtn">Sign In</button>
            </form>
            <div class="modal-toggle" id="modalToggle" onclick="toggleAuthMode()">
                Don't have an account? <span>Sign Up</span>
            </div>
        </div>
    </div>

    <script>
        const fallbackImg = 'https://images.unsplash.com/photo-1556911220-e15b29be8c8f?w=500&auto=format&fit=crop&q=60';
        let isSignUp = false;

        async function fetchProducts() {
            const grid = document.getElementById('productGrid');
            try {
                const res = await fetch('/api/products');
                const products = await res.json();

                if (!products || products.length === 0) {
                    grid.innerHTML = '<p style="color: var(--text-muted);">No products available.</p>';
                    return;
                }

                grid.innerHTML = products.map(p => {
                    let imgUrl = (p.imageUrl && p.imageUrl.trim().length > 0) ? p.imageUrl.trim() : null;
                    const nameLower = p.name.toLowerCase();

                    if (!imgUrl) {
                        if (nameLower.includes('tea')) {
                            imgUrl = 'https://images.unsplash.com/photo-1576092768241-dec231879fc3?w=500&auto=format&fit=crop&q=60';
                        } else if (nameLower.includes('chai')) {
                            imgUrl = 'https://images.unsplash.com/photo-1561336313-0bd5e0b27ec8?w=500&auto=format&fit=crop&q=60';
                        } else if (nameLower.includes('honey')) {
                            imgUrl = 'https://images.unsplash.com/photo-1587049352847-4a222e784d38?w=500&auto=format&fit=crop&q=60';
                        } else if (nameLower.includes('lotus') || nameLower.includes('seed')) {
                            imgUrl = 'https://i.postimg.cc/qRxHwXMc/Image-7-22-26-at-10-33-AM.png';
                        } else {
                            imgUrl = fallbackImg;
                        }
                    }

                    return `
                        <div class="card">
                            <img src="${imgUrl}" class="card-img" alt="${p.name}" onerror="this.onerror=null; this.src='${fallbackImg}';">
                            <div class="card-body">
                                <div class="card-title">${p.name}</div>
                                ${p.description ? `<p class="card-desc">${p.description}</p>` : ''}
                                <div class="card-footer">
                                    <div class="price">$${p.price.toFixed(2)}</div>
                                    <div class="stock-badge">In Stock: ${p.quantity}</div>
                                </div>
                                <button class="btn-cart">Add to Cart</button>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (err) {
                console.error(err);
                grid.innerHTML = '<p style="color: red;">Failed to load products.</p>';
            }
        }

        function openLoginModal() { document.getElementById('loginModal').style.display = 'flex'; }
        function closeLoginModal() { document.getElementById('loginModal').style.display = 'none'; }

        function toggleAuthMode() {
            isSignUp = !isSignUp;
            document.getElementById('modalTitle').innerText = isSignUp ? 'Create Account' : 'Sign In';
            document.getElementById('authSubmitBtn').innerText = isSignUp ? 'Sign Up' : 'Sign In';
            document.getElementById('modalToggle').innerHTML = isSignUp 
                ? 'Already have an account? <span>Sign In</span>' 
                : "Don't have an account? <span>Sign Up</span>";
        }

        async function handleAuth(e) {
            e.preventDefault();
            const email = document.getElementById('authEmail').value;
            const password = document.getElementById('authPassword').value;
            const endpoint = isSignUp ? '/api/users/register' : '/api/users/login';

            const res = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const data = await res.json();
            if (res.ok) {
                alert(data.message || 'Success!');
                closeLoginModal();
            } else {
                alert(data.message || 'Authentication failed');
            }
        }

        window.onclick = function(e) {
            const modal = document.getElementById('loginModal');
            if (e.target === modal) closeLoginModal();
        };

        fetchProducts();
    </script>
</body>
</html>
