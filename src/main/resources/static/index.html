<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Store Infinity</title>
    <style>
        :root { --primary: #111827; --bg: #ffffff; --card-bg: #f9fafb; --border: #e5e7eb; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; background-color: var(--bg); color: var(--primary); }
        
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 1rem 2rem; background: #000; color: #fff; }
        .navbar a { color: #fff; text-decoration: none; margin-left: 1rem; font-size: 0.9rem; }

        .hero { position: relative; height: 320px; background: #000 url('/galaxy.jpg') center/cover no-repeat; display: flex; align-items: center; justify-content: center; text-align: center; color: #fff; }
        .hero-overlay { position: absolute; inset: 0; background: rgba(0, 0, 0, 0.45); }
        .hero-content { position: relative; z-index: 1; }
        .hero h1 { font-size: 2.5rem; letter-spacing: 2px; }

        .container { max-width: 1000px; margin: 2rem auto; padding: 0 1rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1.5rem; }
        .product-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; padding: 1.5rem; text-align: center; }
        .product-card h3 { margin-bottom: 0.5rem; }
        .price { font-size: 1.25rem; font-weight: bold; color: #059669; margin: 0.5rem 0; }
        .buy-btn { background: var(--primary); color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; margin-top: 0.5rem; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo"><strong>Online Store Infinity</strong></div>
        <div>
            <a href="/index.html">Store</a>
            <a href="/admin.html">Admin Portal</a>
        </div>
    </nav>

    <header class="hero">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1>Online Store Infinity</h1>
            <p>Welcome to Our Shop</p>
        </div>
    </header>

    <main class="container">
        <h2 style="margin-bottom: 1.5rem;">Available Products</h2>
        <div id="productGrid" class="grid"></div>
    </main>

    <script>
        async function fetchProducts() {
            const res = await fetch('/api/products');
            const products = await res.json();
            const grid = document.getElementById('productGrid');
            if (products.length === 0) {
                grid.innerHTML = '<p>No products available right now.</p>';
                return;
            }
            grid.innerHTML = products.map(p => `
                <div class="product-card">
                    <h3>${p.name}</h3>
                    <div class="price">$${p.price.toFixed(2)}</div>
                    <p style="color: #6b7280; font-size: 0.85rem;">In Stock: ${p.quantity}</p>
                    <button class="buy-btn" onclick="alert('Added ${p.name} to cart!')">Add to Cart</button>
                </div>
            `).join('');
        }
        fetchProducts();
    </script>
</body>
</html>
