<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Store Infinity</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        h1 { color: #2c3e50; }
        .form-group { display: flex; gap: 10px; margin-bottom: 2rem; }
        input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; flex: 1; }
        button { background: #27ae60; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
        button.delete { background: #e74c3c; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #ddd; }
    </style>
</head>
<body>
    <h1>Welcome to Online Store Infinity</h1>
    <div class="form-group">
        <input type="text" id="name" placeholder="Product Name">
        <input type="number" id="price" placeholder="Price ($)" step="0.01">
        <input type="number" id="quantity" placeholder="Quantity">
        <button onclick="addProduct()">Add Product</button>
    </div>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Price</th>
                <th>Stock</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="productTable"></tbody>
    </table>
    <script>
        const API_URL = '/api/products';
        async function fetchProducts() {
            const response = await fetch(API_URL);
            const products = await response.json();
            const tbody = document.getElementById('productTable');
            tbody.innerHTML = products.map(p => `
                <tr>
                    <td>${p.id}</td>
                    <td>${p.name}</td>
                    <td>$${p.price.toFixed(2)}</td>
                    <td>${p.quantity}</td>
                    <td><button class="delete" onclick="deleteProduct(${p.id})">Remove</button></td>
                </tr>
            `).join('');
        }
        async function addProduct() {
            const name = document.getElementById('name').value;
            const price = parseFloat(document.getElementById('price').value);
            const quantity = parseInt(document.getElementById('quantity').value);
            if (!name || isNaN(price) || isNaN(quantity)) return alert('Please fill all fields');
            await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, price, quantity })
            });
            document.getElementById('name').value = '';
            document.getElementById('price').value = '';
            document.getElementById('quantity').value = '';
            fetchProducts();
        }
        async function deleteProduct(id) {
            await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
            fetchProducts();
        }
        fetchProducts();
    </script>
</body>
</html>
