<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Online Store Infinity</title>
    <style>
        :root { --primary: #111827; --bg: #ffffff; --card-bg: #f9fafb; --border: #e5e7eb; --danger: #ef4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; background-color: var(--bg); color: var(--primary); }
        
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 1rem 2rem; background: #111827; color: #fff; }
        .navbar a { color: #fff; text-decoration: none; margin-left: 1rem; font-size: 0.9rem; }

        .container { max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; padding: 1.5rem; margin-bottom: 2rem; }
        .form-grid { display: grid; grid-template-columns: 2fr 1fr 1fr auto; gap: 10px; }
        input { padding: 10px; border: 1px solid var(--border); border-radius: 6px; }
        button.add-btn { background: #10b981; color: white; border: none; padding: 10px 18px; border-radius: 6px; cursor: pointer; }
        
        table { width: 100%; border-collapse: collapse; background: white; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--border); }
        th { background: #f3f4f6; font-size: 0.85rem; text-transform: uppercase; }
        .delete-btn { background: var(--danger); color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo"><strong>Infinity Admin Portal</strong></div>
        <div>
            <a href="/index.html">View Storefront</a>
        </div>
    </nav>

    <main class="container">
        <div class="card">
            <h2>Add New Product</h2>
            <div class="form-grid" style="margin-top: 1rem;">
                <input type="text" id="name" placeholder="Product Name">
                <input type="number" id="price" placeholder="Price ($)" step="0.01">
                <input type="number" id="quantity" placeholder="Quantity">
                <button class="add-btn" onclick="addProduct()">Add Product</button>
            </div>
        </div>

        <h3>Inventory List</h3>
        <table style="margin-top: 1rem;">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Price</th>
                    <th>Stock</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="adminTable"></tbody>
        </table>
    </main>

    <script>
        const API_URL = '/api/products';

        async function fetchProducts() {
            const res = await fetch(API_URL);
            const products = await res.json();
            const tbody = document.getElementById('adminTable');
            tbody.innerHTML = products.map(p => `
                <tr>
                    <td>#${p.id}</td>
                    <td><strong>${p.name}</strong></td>
                    <td>$${p.price.toFixed(2)}</td>
                    <td>${p.quantity}</td>
                    <td><button class="delete-btn" onclick="deleteProduct(${p.id})">Remove</button></td>
                </tr>
            `).join('');
        }

        async function addProduct() {
            const name = document.getElementById('name').value;
            const price = parseFloat(document.getElementById('price').value);
            const quantity = parseInt(document.getElementById('quantity').value);
            if (!name || isNaN(price) || isNaN(quantity)) return alert('Fill all fields');

            await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, price, quantity })
            });
            document.getElementById('name').value = '';
            document.getElementById('price').value = '';
            document.getElementById('quantity').value = '';
            fetchProducts();
        }

        async function deleteProduct(id) {
            await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
            fetchProducts();
        }

        fetchProducts();
    </script>
</body>
</html>
